<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>click</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000000;
    color:#ffffff;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#ffffff;
    margin-bottom:30px;
}

label{
    display:block;
    width:220px;
    margin:20px auto;
    background:#ffffff;
    color:#000000;
    padding:15px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    border:2px solid #ffffff;
    transition:.3s;
}

label:hover{
    background:#000000;
    color:#ffffff;
}

input{
    display:none;
}

.gallery{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#000000;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #ffffff;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    filter:grayscale(100%);
}

.info{
    padding:15px;
}

.info h3{
    font-size:15px;
    margin-bottom:10px;
    word-break:break-word;
    color:#ffffff;
}

.info p{
    text-align:left;
    margin:5px 0;
    color:#ffffff;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">


<p>
</p>

<label for="images">
💀
</label>

<input
type="file"
id="images"
accept="image/*"
multiple>

<div class="gallery" id="gallery"></div>

</div>
<script>

const input=document.getElementById("images");
const gallery=document.getElementById("gallery");

const downloadBtn=document.createElement("button");
downloadBtn.textContent="Download Info as .txt";
downloadBtn.style.display="none";
gallery.parentNode.insertBefore(downloadBtn, gallery);

let fileInfoText="";

input.addEventListener("change",function(){

gallery.innerHTML="";
fileInfoText="";

[...this.files].forEach(file=>{

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");

img.src=URL.createObjectURL(file);

const info=document.createElement("div");
info.className="info";

const kb=(file.size/1024).toFixed(2);

info.innerHTML=`
<h3>${file.name}</h3>
<p><strong>Type:</strong> ${file.type}</p>
<p><strong>Size:</strong> ${kb} KB</p>
<p><strong>Last Modified:</strong><br>${new Date(file.lastModified).toLocaleString()}</p>
`;

card.appendChild(img);
card.appendChild(info);

gallery.appendChild(card);

fileInfoText+=`Name: ${file.name}\nType: ${file.type}\nSize: ${kb} KB\nLast Modified: ${new Date(file.lastModified).toLocaleString()}\n-----------------------------\n`;

});

downloadBtn.style.display = this.files.length ? "inline-block" : "none";

});

downloadBtn.addEventListener("click", function(){
const blob = new Blob([fileInfoText], { type: "text/plain" });
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "image-info.txt";
a.click();
URL.revokeObjectURL(url);
});

</script>

</body>
</html>
